<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG ĐẶT SÂN PHÚC AN BADMINTON</title>
    <style>
        :root {
            --mau-chinh: #2ecc71;
            --mau-phu: #27ae60;
            --mau-toi: #2c3e50;
            --mau-sang: #ecf0f1;
            --mau-xanh-duong: #3498db;
            --mau-do: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 20px;
            color: var(--mau-toi);
        }

        .khung-chua {
            max-width: 650px;
            margin: 0 auto 20px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            text-align: center;
            color: var(--mau-phu);
            margin-top: 0;
        }

        .o-nhap {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--mau-chinh);
        }

        .nhom-nut {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--mau-chinh);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--mau-phu);
        }

        button.nut-phu {
            background-color: var(--mau-xanh-duong);
        }

        button.nut-phu:hover {
            background-color: #2980b9;
        }

        button.nut-dang-xuat {
            background-color: #7f8c8d;
            padding: 5px 10px;
            font-size: 14px;
            width: auto;
            display: inline-block;
        }

        .an-di {
            display: none;
        }

        .thong-bao-dang-nhap {
            background-color: #e8f8f5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid var(--mau-chinh);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .danh-sach-gio {
            margin-top: 20px;
        }

        .o-gio {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 15px;
            border: 1px solid #ddd;
            transition: all 0.2s;
        }

        .o-gio.trong {
            background-color: #ffffff;
            color: #333;
            border-left: 6px solid var(--mau-chinh);
        }

        .o-gio.da-dat {
            background-color: #fdf2f2;
            color: var(--mau-do);
            border-left: 6px solid var(--mau-do);
        }

        .nut-dat-nhanh {
            background-color: var(--mau-chinh);
            color: white;
            padding: 6px 12px;
            font-size: 13px;
            width: auto;
            border-radius: 4px;
        }
        .nut-dat-nhanh:hover { background-color: var(--mau-phu); }

        .nut-huy-admin {
            background-color: var(--mau-do);
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            width: auto;
            border-radius: 4px;
            margin-left: 10px;
        }
        .nut-huy-admin:hover { background-color: #c0392b; }

        .chu-thich {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .cham-tron {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div id="khungTaiKhoan" class="khung-chua">
    <div id="formDangNhapPhan">
        <h2>🔐 Đăng Nhập Thành Viên</h2>
        <form id="formDangNhap">
            <div class="o-nhap">
                <label>Số điện thoại:</label>
                <input type="tel" id="dnSdt" required placeholder="Nhập số điện thoại">
            </div>
            <div class="o-nhap">
                <label>Mật khẩu:</label>
                <input type="password" id="dnMatKhau" required placeholder="Nhập mật khẩu">
            </div>
            <button type="submit">Đăng Nhập</button>
            <p style="text-align:center; margin-bottom:0; margin-top: 15px;">Chưa có tài khoản? <a href="#" onclick="window.chuyenForm('dangky')">Đăng ký ngay</a></p>
        </form>
    </div>

    <div id="formDangKyPhan" class="an-di">
        <h2>📝 Đăng Ký Tài Khoản</h2>
        <form id="formDangKy">
            <div class="o-nhap">
                <label>Họ và Tên:</label>
                <input type="text" id="dkTen" required placeholder="Nhập tên của bạn">
            </div>
            <div class="o-nhap">
                <label>Số điện thoại:</label>
                <input type="tel" id="dkSdt" required placeholder="Nhập số điện thoại để đăng nhập">
            </div>
            <div class="o-nhap">
                <label>Mật khẩu tự chọn:</label>
                <input type="password" id="dkMatKhau" required placeholder="Tạo mật khẩu">
            </div>
            <div class="nhom-nut">
                <button type="submit">Xác Nhận Đăng Ký</button>
                <button type="button" class="nut-phu" onclick="window.chuyenForm('dangnhap')">Quay lại</button>
            </div>
        </form>
    </div>
</div>

<div class="khung-chua">
    <div id="thongBaoUser" class="thong-bao-dang-nhap an-di">
        <span>Xin chào: <b id="tenKhachHienTai"></b> (<span id="sdtKhachHienTai"></span>)</span>
        <button class="nut-dang-xuat" onclick="window.dangXuat()">Đăng xuất</button>
    </div>

    <h1>🏸 Tra Cứu & Đặt Sân Cầu Lông</h1>
    
    <div class="o-nhap">
        <label>1. Chọn Sân muốn xem:</label>
        <select id="chonSan" onchange="window.capNhatGiaoDienLich()">
            <option value="Sân số 1">Sân số 1</option>
            <option value="Sân số 2">Sân số 2</option>
        </select>
    </div>

    <div class="o-nhap">
        <label>2. Chọn Ngày muốn xem:</label>
        <input type="date" id="chonNgay" onchange="window.capNhatGiaoDienLich()" required>
    </div>
</div>

<div class="khung-chua">
    <h3>📊 Tình Trạng Lịch Sân</h3>
    
    <div class="chu-thich">
        <span><span class="cham-tron" style="background-color: #fff; border:1px solid #ccc;"></span>Lịch trống (Trắng)</span>
        <span><span class="cham-tron" style="background-color: var(--mau-do);"></span>Đã được đặt (Đỏ)</span>
    </div>

    <div id="vungHienThiLich" class="danh-sach-gio"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAs-wZ-Fm49pTHeZ15T8bZc9S9oFm6XvM4",
        authDomain: "phuc-an-badminton-1ab18.firebaseapp.com",
        databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com",
        projectId: "phuc-an-badminton-1ab18",
        storageBucket: "phuc-an-badminton-1ab18.appspot.com",
        messagingSenderId: "569618037341",
        appId: "1:569618037341:web:d236ef0d8efda08b9f1d07"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const MAT_KHAU_ADMIN = "PhucAn2026$";

    let danhSachTaiKhoan = JSON.parse(localStorage.getItem('dstkCauLong')) || [];
    let userHienTai = JSON.parse(localStorage.getItem('userHienTaiCauLong')) || null;
    let danhSachDatSan = [];

    const homNay = new Date().toISOString().split('T')[0];
    document.getElementById('chonNgay').value = homNay;

    // DANH SÁCH KHUNG GIỜ ĐÃ ĐƯỢC THÊM CÁC CA ĐUÔI :30 (1h30, 4h30, v.v...)
    const cacKhungGioHoatDong = [
        "05:00 - 06:00", "05:30 - 07:00", "06:00 - 07:00", "07:00 - 08:00", 
        "08:00 - 09:00", "09:00 - 10:00", "10:00 - 11:00", "15:00 - 16:00", 
        "16:00 - 17:00", "16:30 - 18:00", "17:00 - 18:00", "17:30 - 19:00", 
        "18:00 - 19:00", "19:00 - 20:00", "19:30 - 21:00", "20:00 - 21:00", 
        "21:00 - 22:00"
    ];

    db.ref('lichDatCauLong').on('value', (snapshot) => {
        const data = snapshot.val();
        danhSachDatSan = [];
        if (data) {
            Object.keys(data).forEach(key => {
                danhSachDatSan.push({
                    idFirebase: key,
                    ...data[key]
                });
            });
        }
        window.capNhatGiaoDienLich();
    });

    window.capNhatGiaoDienLich = function() {
        const sanChon = document.getElementById('chonSan').value;
        const ngayChon = document.getElementById('chonNgay').value;
        const vungLich = document.getElementById('vungHienThiLich');
        
        vungLich.innerHTML = '';

        if (!ngayChon) {
            vungLich.innerHTML = '<p class="tin-nhan-trong">Vui lòng chọn ngày để xem lịch sân.</p>';
            return;
        }

        cacKhungGioHoatDong.forEach(khungGio => {
            const thongTinDat = danhSachDatSan.find(l => l.san === sanChon && l.ngay === ngayChon && l.khungGio === khungGio);
            const theGio = document.createElement('div');
            
            if (thongTinDat) {
                theGio.className = "o-gio da-dat";
                theGio.innerHTML = `
                    <div>
                        ⏰ <b>${khungGio}</b> — 🛑 Đã đặt: <b>${thongTinDat.ten}</b> (${thongTinDat.sdt})
                    </div>
                    <button class="nut-huy-admin" onclick="window.xoaLichDatTheoId('${thongTinDat.idFirebase}')">Hủy (Admin)</button>
                `;
            } else {
                theGio.className = "o-gio trong";
                theGio.innerHTML = `
                    <div>⏰ <b>${khungGio}</b> — 🟢 Sân trống</div>
                    ${userHienTai ? `<button class="nut-dat-nhanh" onclick="window.datSanNhanh('${khungGio}')">Đặt Sân</button>` : '<small style="color:#7f8c8d;">Đăng nhập để đặt</small>'}
                `;
            }
            vungLich.appendChild(theGio);
        });
    }

    window.datSanNhanh = function(khungGio) {
        if (!userHienTai) {
            alert('⚠️ Bạn cần đăng nhập tài khoản trước khi đặt sân!');
            return;
        }

        const san = document.getElementById('chonSan').value;
        const ngay = document.getElementById('chonNgay').value;

        if(confirm(`Bạn muốn xác nhận đặt [${san}] ngày [${ngay}] vào khung giờ [${khungGio}] không?`)) {
            db.ref('lichDatCauLong').push({
                ten: userHienTai.ten,
                sdt: userHienTai.sdt,
                san,
                ngay,
                khungGio
            }).then(() => {
                alert('🎉 Đặt sân thành công trên hệ thống trực tuyến!');
            }).catch((error) => {
                alert('❌ Lỗi không thể lưu dữ liệu: ' + error.message);
            });
        }
    }

    window.xoaLichDatTheoId = function(idFirebase) {
        const matKhauNhap = prompt("🔐 Tính năng này cần quyền Quản trị viên.\nVui lòng nhập mật khẩu để giải phóng lịch sân:");
        
        if (matKhauNhap === null) return;

        if (matKhauNhap === PhucAn2026$) {
            if(confirm('Mật khẩu đúng! Bạn có chắc chắn muốn hủy và giải phóng lịch đặt này trên đám mây không?')) {
                db.ref('lichDatCauLong/' + idFirebase).remove().then(() => {
                    alert('🗑️ Đã hủy lịch và giải phóng sân trống thành công!');
                });
            }
        } else {
            alert('❌ Sai mật khẩu quản trị!');
        }
    }

    window.chuyenForm = function(loai) {
        if(loai === 'dangky') {
            document.getElementById('formDangNhapPhan').classList.add('an-di');
            document.getElementById('formDangKyPhan').classList.remove('an-di');
        } else {
            document.getElementById('formDangKyPhan').classList.add('an-di');
            document.getElementById('formDangNhapPhan').classList.remove('an-di');
        }
    }

    window.dangXuat = function() {
        userHienTai = null;
        localStorage.removeItem('userHienTaiCauLong');
        kiemTraTrangThaiDangNhap();
        window.capNhatGiaoDienLich();
        alert('🔒 Đã đăng xuất tài khoản thành công!');
    }

    function kiemTraTrangThaiDangNhap() {
        if(userHienTai) {
            document.getElementById('khungTaiKhoan').classList.add('an-di');
            document.getElementById('thongBaoUser').classList.remove('an-di');
            document.getElementById('tenKhachHienTai').innerText = userHienTai.ten;
            document.getElementById('sdtKhachHienTai').innerText = userHienTai.sdt;
        } else {
            document.getElementById('khungTaiKhoan').classList.remove('an-di');
            document.getElementById('thongBaoUser').classList.add('an-di');
            document.getElementById('formDangNhap').reset();
        }
    }

    document.getElementById('formDangKy').addEventListener('submit', function(e) {
        e.preventDefault();
        const ten = document.getElementById('dkTen').value.trim();
        const sdt = document.getElementById('dkSdt').value.trim();
        const matKhau = document.getElementById('dkMatKhau').value;

        danhSachTaiKhoan = JSON.parse(localStorage.getItem('dstkCauLong')) || [];

        if(danhSachTaiKhoan.some(tk => tk.sdt === sdt)) {
            alert('⚠️ Số điện thoại này đã được ký tài khoản rồi!');
            return;
        }

        danhSachTaiKhoan.push({ ten, sdt, matKhau });
        localStorage.setItem('dstkCauLong', JSON.stringify(danhSachTaiKhoan));
        
        alert('🎉 Đăng ký thành công! Hãy đăng nhập để tiếp tục.');
        document.getElementById('formDangKy').reset();
        window.chuyenForm('dangnhap');
    });

    document.getElementById('formDangNhap').addEventListener('submit', function(e) {
        e.preventDefault();
        const sdt = document.getElementById('dnSdt').value.trim();
        const matKhau = document.getElementById('dnMatKhau').value;

        danhSachTaiKhoan = JSON.parse(localStorage.getItem('dstkCauLong')) || [];
        const taiKhoan = danhSachTaiKhoan.find(tk => tk.sdt === sdt && tk.matKhau === matKhau);

        if(taiKhoan) {
            userHienTai = taiKhoan;
            localStorage.setItem('userHienTaiCauLong', JSON.stringify(userHienTai));
            kiemTraTrangThaiDangNhap();
            window.capNhatGiaoDienLich();
            alert('🔓 Đăng nhập thành công!');
        } else {
            alert('❌ Sai số điện thoại hoặc mật khẩu!');
        }
    });

    kiemTraTrangThaiDangNhap();
</script>

</body>
</html>
