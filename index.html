<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÚC AN BADMINTON</title>
    <style>
        :root { --primary: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; font-size: 1.5em; }
        .hotline { background: #fff3cd; color: #856404; padding: 10px; border-radius: 12px; text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 0.9em; }
        .box { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        /* Khung giờ chọn nhanh */
        .time-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .chip { padding: 8px 12px; background: #e8f5e9; border: 1px solid var(--primary); border-radius: 20px; font-size: 0.85em; cursor: pointer; color: var(--primary); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div class="card">
    <h1>🏸 PHÚC AN BADMINTON 🏸</h1>
    <div class="hotline">☎ Hủy/Đổi sân gọi: 0395.936.865</div>

    <!-- Đăng ký thông tin -->
    <div class="box">
        <h3 style="margin-top:0;">ĐĂNG KÝ THÔNG TIN</h3>
        <input type="text" id="hoTen" placeholder="Họ và tên khách">
        <input type="tel" id="sdt" placeholder="Số điện thoại">
        <button onclick="luuThongTin()" style="background:#34495e;">Lưu thông tin</button>
    </div>

    <!-- Chọn lịch -->
    <label>Chọn Sân & Ngày</label>
    <select id="san" onchange="loadLich()"><option>Sân số 1</option><option>Sân số 2</option></select>
    <input type="date" id="ngay" onchange="loadLich()">

    <label>Chọn khung giờ nhanh:</label>
    <div class="time-chips">
        <span class="chip" onclick="chonGio('05:00-06:00')">05-06h</span>
        <span class="chip" onclick="chonGio('06:00-07:00')">06-07h</span>
        <span class="chip" onclick="chonGio('17:00-18:00')">17-18h</span>
        <span class="chip" onclick="chonGio('18:00-19:00')">18-19h</span>
        <span class="chip" onclick="chonGio('19:00-20:00')">19-20h</span>
        <span class="chip" onclick="chonGio('20:00-21:00')">20-21h</span>
    </div>
    <input type="text" id="thoiGian" placeholder="Hoặc nhập khung giờ tùy ý...">
    
    <button onclick="datSan()">XÁC NHẬN ĐẶT SÂN</button>

    <h3 style="margin-top:30px;">Lịch đã đặt:</h3>
    <div id="danhSach"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAs-wZ-Fm49pTHeZ15T8bZc9S9oFm6XvM4", databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com", projectId: "phuc-an-badminton-1ab18" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function chonGio(g) { document.getElementById('thoiGian').value = g; }
    
    function luuThongTin() {
        localStorage.setItem('user', JSON.stringify({hoTen: document.getElementById('hoTen').value, sdt: document.getElementById('sdt').value}));
        alert("Thông tin khách đã được lưu!");
    }

    function datSan() {
        const user = JSON.parse(localStorage.getItem('user'));
        const thoiGian = document.getElementById('thoiGian').value;
        if(!user || !user.hoTen) return alert("Vui lòng lưu thông tin trước!");
        if(!thoiGian) return alert("Vui lòng chọn hoặc nhập khung giờ!");
        
        db.ref('lichDatCauLong').push({
            ten: user.hoTen, sdt: user.sdt,
            san: document.getElementById('san').value,
            ngay: document.getElementById('ngay').value,
            thoiGian: thoiGian
        }).then(() => alert("Đặt sân thành công!"));
    }

    function loadLich() {
        const san = document.getElementById('san').value;
        const ngay = document.getElementById('ngay').value;
        db.ref('lichDatCauLong').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let l = c.val();
                if(l.san == san && l.ngay == ngay) {
                    html += `<div class="list-item"><span><b>${l.thoiGian}</b> | ${l.ten}</span>
                             <button style="background:#e74c3c; width:auto; padding:6px 12px; border-radius:8px;" onclick="huy('${c.key}')">Hủy</button></div>`;
                }
            });
            document.getElementById('danhSach').innerHTML = html || "<p style='text-align:center; color:#999;'>Sân đang trống</p>";
        });
    }

    function huy(id) {
        if(prompt("Mật khẩu Admin:") == "PhucAn2026$") db.ref('lichDatCauLong/'+id).remove();
    }

    window.onload = () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) { document.getElementById('hoTen').value = user.hoTen; document.getElementById('sdt').value = user.sdt; }
    };
    document.getElementById('ngay').valueAsDate = new Date();
    loadLich();
</script>
</body>
</html>
