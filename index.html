<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG ĐẶT SÂN PHÚC AN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .btn-huy { background: #e74c3c; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-huy:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: #27ae60;">LỊCH ĐẶT SÂN</h2>
    <div class="input-group">
        <label>Chọn Sân:</label>
        <select id="chonSan" onchange="renderLich()">
            <option value="Sân số 1">Sân số 1</option>
            <option value="Sân số 2">Sân số 2</option>
        </select>
    </div>
    <div class="input-group">
        <label>Chọn Ngày:</label>
        <input type="date" id="chonNgay" onchange="renderLich()">
    </div>
    <div id="danhSachLich"></div>
</div>

<script>
    // Cấu hình Firebase
    const firebaseConfig = {
        databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataFirebase = [];

    // Tải dữ liệu từ Firebase
    db.ref('lichDatCauLong').on('value', (snapshot) => {
        dataFirebase = [];
        snapshot.forEach((child) => {
            // Lưu cả key (ID) của Firebase vào object
            dataFirebase.push({ id: child.key, ...child.val() });
        });
        renderLich();
    });

    // Hiển thị lịch
    function renderLich() {
        const san = document.getElementById('chonSan').value;
        const ngay = document.getElementById('chonNgay').value;
        const container = document.getElementById('danhSachLich');
        container.innerHTML = '';

        const filterData = dataFirebase.filter(item => item.san === san && item.ngay === ngay);

        if (filterData.length === 0) {
            container.innerHTML = '<p style="text-align:center;">Chưa có lịch đặt.</p>';
        } else {
            filterData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <span><b>${item.khungGio || 'N/A'}</b> - ${item.ten} (${item.sdt})</span>
                    <button class="btn-huy" onclick="xuLyHuy('${item.id}')">Hủy</button>
                `;
                container.appendChild(div);
            });
        }
    }

    // HÀM HỦY SÂN CỐ ĐỊNH (Xóa trực tiếp theo ID)
    window.xuLyHuy = function(id) {
        const mk = prompt("Nhập mật khẩu quản trị để hủy:");
        if (mk !== "PhucAn2026$") {
            alert("Mật khẩu sai!");
            return;
        }

        // Dùng ID đã được truyền vào hàm để xóa chính xác node đó
        db.ref('lichDatCauLong/' + id).remove()
        .then(() => {
            alert("Đã hủy lịch thành công!");
        })
        .catch(err => {
            alert("Lỗi: " + err.message);
        });
    }

    // Thiết lập ngày mặc định là hôm nay
    document.getElementById('chonNgay').valueAsDate = new Date();
</script>
</body>
</html>
